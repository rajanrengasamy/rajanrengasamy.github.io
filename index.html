<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rengasamy Family Hub</title>
  <style>
    :root { --bg: #0d1117; --card: #161b22; --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff; --border: #30363d; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem; }
    .container { max-width: 720px; margin: 0 auto; }
    h1 { font-size: 2rem; margin-bottom: 0.5rem; }
    .subtitle { color: var(--muted); margin-bottom: 2rem; }
    .section { margin-bottom: 2rem; }
    .section h2 { font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
    .cards { display: grid; gap: 1rem; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; text-decoration: none; color: inherit; transition: border-color 0.2s; }
    .card:hover { border-color: var(--accent); }
    .card h3 { font-size: 1.125rem; margin-bottom: 0.25rem; color: var(--accent); }
    .card p { color: var(--muted); font-size: 0.9rem; }
    .tag { display: inline-block; font-size: 0.75rem; background: var(--border); padding: 0.125rem 0.5rem; border-radius: 12px; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🏠 Rengasamy Hub</h1>
    <p class="subtitle">Shared pages for family & projects</p>
    
    <div class="section">
      <h2>🌸 Family</h2>
      <div class="cards">
        <a href="/japan-2026/" class="card">
          <h3>Japan 2026</h3>
          <p>Family adventure itinerary — Tokyo, Nagoya, Osaka, Kyoto</p>
          <span class="tag">Apr 12-26</span>
        </a>
      </div>
    </div>
    
    <div class="section">
      <h2>📁 Docs</h2>
      <div class="cards" id="docs">
        <div class="card" style="opacity: 0.5; cursor: default;">
          <h3>Coming soon</h3>
          <p>Technical docs and references</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
